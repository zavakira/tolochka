<header class="site-header">
  <a class="header-logo" href="/">toloka</a>
  <nav class="header-nav" aria-label="Головна навігація">
    <a class="btn btn--primary" href="#" data-open-register>Зареєструватися</a>

    <!-- Burger / close toggle — Figma 1904:5112 (default) · 1929:5935 (open)

         Icon swap is handled by initNavDropdown() in main.js.               -->

            data-nav-menu
            aria-label="Відкрити меню"
            aria-expanded="false">

      <svg class="btn-menu__burger" width="20" height="20" viewBox="0 0 20 20" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <!-- X icon — hidden by default; shown when dropdown is open (Figma 1929:5935) -->
      <svg class="btn-menu__close" style="display:none" width="20" height="20" viewBox="0 0 20 20" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3.75 3.75L16.25 16.25M16.25 3.75L3.75 16.25"
              stroke="#0E0F10" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </nav>

  <!-- Nav dropdown (Figma 1929:5965) — white · shadow · radius 0 0 20px 20px
       Absolute below header. Shown/hidden by initNavDropdown() in main.js.  -->
  <nav class="header-nav-dropdown" aria-label="Навігація" aria-hidden="true">
    <div class="header-nav-dropdown__list">
      <a class="header-nav-dropdown__link" href="#" data-nav-home>Головна</a>
      <a class="header-nav-dropdown__link" href="#" data-open-screen="maps">Мапа толок</a>
      <a class="header-nav-dropdown__link js-open-about" href="#">Про нас</a>
      <a class="header-nav-dropdown__link" href="#" data-open-screen="profile">Профіль</a>
    </div>
  </nav>

</header>
